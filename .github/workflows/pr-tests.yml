name: PR Tests

on:
  pull_request:
    branches: ['**']

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        check:
          - typecheck
          - lint
          - lint:knip
          - test:run
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run ${{ matrix.check }}

  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - run: npx playwright test --shard=${{ matrix.shard }}/2
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 30

  sync-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ankitects/anki
          path: _anki
          fetch-depth: 1
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain and protobuf
        uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: |
            _anki/target
            ~/.cargo/registry
            ~/.cargo/git
          key: sync-server-${{ runner.os }}-${{ hashFiles('_anki/Cargo.lock') }}
          restore-keys: sync-server-${{ runner.os }}-

      - name: Build anki-sync-server
        run: |
          cd _anki
          cargo build --package anki-sync-server --release
        env:
          CARGO_INCREMENTAL: 0
          PROTOC: /usr/bin/protoc

      - run: npm ci

      - name: Run sync integration tests
        run: npm run test:integration
        env:
          ANKI_SYNC_SERVER_BIN: ${{ github.workspace }}/_anki/target/release/anki-sync-server
